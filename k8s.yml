# ──────────────────────────────────────────────
#  Namespace — isolate application resources
# ──────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: angular-dotnet
  labels:
    app: angular-dotnet
    managed-by: kubectl
---
# ──────────────────────────────────────────────
#  ConfigMap — externalized application config
# ──────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: angular-dotnet-config
  namespace: angular-dotnet
  labels:
    app: angular-dotnet
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  DOTNET_RUNNING_IN_CONTAINER: "true"
---
# ──────────────────────────────────────────────
#  Deployment — angular-dotnet application
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-dotnet
  namespace: angular-dotnet
  labels:
    app: angular-dotnet
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: angular-dotnet
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: angular-dotnet
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: angular-dotnet
          # Note: The pipeline will automatically overwrite this tag with the Build ID!
          image: tasbirul.azurecr.io/angular-dotnet:latest 
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: angular-dotnet-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
---
# ──────────────────────────────────────────────
#  Service — expose the application
# ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: angular-dotnet
  namespace: angular-dotnet
  labels:
    app: angular-dotnet
spec:
  type: LoadBalancer
  selector:
    app: angular-dotnet
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# ──────────────────────────────────────────────
#  Horizontal Pod Autoscaler
# ──────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: angular-dotnet-hpa
  namespace: angular-dotnet
  labels:
    app: angular-dotnet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: angular-dotnet
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80