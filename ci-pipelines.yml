# Docker & AKS CI/CD Pipeline
# Builds an image, pushes to ACR, and deploys to AKS with automatic rollback

trigger:
- main

resources:
- repo: self

variables:
  # CI Variables (ACR)
  dockerRegistryServiceConnection: '61b4072d-6adb-4ddd-8519-09ad762ebd15'
  imageRepository: 'angular-dotnet'
  containerRegistry: 'tasbirul.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)' 
  
  # CD Variables (AKS)
  aksServiceConnection: 'aks-service-connection' 
  kubernetesNamespace: 'angular-dotnet'
  
  # Agent VM
  vmImageName: 'ubuntu-latest'

stages:
# ──────────────────────────────────────────────
#  STAGE 1: CI (Build & Push)
# ──────────────────────────────────────────────
- stage: Build
  displayName: Build and Push
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
    
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Kubernetes Manifests'
      inputs:
        # ✅ FIXED: This now correctly points to your k8s-manifests folder
        targetPath: '$(Build.SourcesDirectory)/k8s-manifests'
        artifact: 'k8s-manifests'
        publishLocation: 'pipeline'

# ──────────────────────────────────────────────
#  STAGE 2: CD (Deploy to AKS)
# ──────────────────────────────────────────────
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployApp
    displayName: Deploy App to AKS
    pool:
      vmImage: $(vmImageName)
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Kubernetes Manifests'
            inputs:
              buildType: 'current'
              artifactName: 'k8s-manifests'
              targetPath: '$(Pipeline.Workspace)/k8s-manifests'

          - task: KubernetesManifest@1
            displayName: 'Deploy to Kubernetes cluster'
            inputs:
              action: 'deploy'
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: '$(aksServiceConnection)'
              namespace: '$(kubernetesNamespace)'
              manifests: |
                $(Pipeline.Workspace)/k8s-manifests/**/*.yml
              containers: |
                $(containerRegistry)/$(imageRepository):$(tag)
                
        # Automatic Rollback if the deployment fails
        on:
          failure:
            steps:
            - task: Kubernetes@1
              displayName: 'Rollback Deployment on Failure'
              inputs:
                connectionType: 'Kubernetes Service Connection'
                kubernetesServiceEndpoint: '$(aksServiceConnection)'
                namespace: '$(kubernetesNamespace)'
                command: 'rollout'
                arguments: 'undo deployment/angular-dotnet'