# Docker & AKS CI/CD Pipeline (Helm Edition)
# Builds an image, pushes to ACR, and deploys to AKS using Helm

trigger:
- main

resources:
- repo: self

variables:
  # CI Variables (ACR)
  dockerRegistryServiceConnection: '61b4072d-6adb-4ddd-8519-09ad762ebd15'
  imageRepository: 'angular-dotnet'
  containerRegistry: 'tasbirul.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)' 
  
  # CD Variables (AKS)
  aksServiceConnection: 'aks-service-connection' 
  kubernetesNamespace: 'angular-dotnet'
  
  # Agent VM
  vmImageName: 'ubuntu-latest'

stages:
# ──────────────────────────────────────────────
#  STAGE 1: CI (Build & Push)
# ──────────────────────────────────────────────
- stage: Build
  displayName: Build and Push
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
    
    # Uploading the new Helm Chart folder
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Helm Chart'
      inputs:
        targetPath: '$(Build.SourcesDirectory)/angular-dotnet-chart' 
        artifact: 'helm-chart'
        publishLocation: 'pipeline'

# ──────────────────────────────────────────────
#  STAGE 2: CD (Deploy to AKS)
# ──────────────────────────────────────────────
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployApp
    displayName: Deploy App to AKS
    pool:
      vmImage: $(vmImageName)
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Helm Chart'
            inputs:
              buildType: 'current'
              artifactName: 'helm-chart'
              targetPath: '$(Pipeline.Workspace)/helm-chart'

          # Helm deployment task
          - task: HelmDeploy@0
            displayName: 'Deploy via Helm'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: '$(aksServiceConnection)'
              namespace: '$(kubernetesNamespace)'
              command: 'upgrade'
              chartType: 'FilePath'
              chartPath: '$(Pipeline.Workspace)/helm-chart'
              releaseName: 'my-angular-app'
              # This dynamically injects the new Build ID tag into your values.yaml
              overrideValues: 'image.tag=$(tag)'
              arguments: '--create-namespace'
                
        # Automatic Helm Rollback if the deployment fails
        on:
          failure:
            steps:
            - task: HelmDeploy@0
              displayName: 'Rollback Helm Release on Failure'
              inputs:
                connectionType: 'Kubernetes Service Connection'
                kubernetesServiceEndpoint: '$(aksServiceConnection)'
                namespace: '$(kubernetesNamespace)'
                command: 'rollback'
                arguments: 'my-angular-app 0' # '0' tells Helm to revert to the previous working revision