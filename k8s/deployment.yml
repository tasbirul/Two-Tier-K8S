# ──────────────────────────────────────────────
#  Deployment — angular-dotnet application
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-dotnet
  namespace: angular-dotnet
  labels:
    app: angular-dotnet
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: angular-dotnet
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: angular-dotnet
    spec:
      # ── Security Context ──
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: angular-dotnet
          image: tasbirul.azurecr.io/angular-dotnet:70
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP

          # ── Environment from ConfigMap ──
          envFrom:
            - configMapRef:
                name: angular-dotnet-config

          # ── Resource Management ──
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          # ── Health Probes ──
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
